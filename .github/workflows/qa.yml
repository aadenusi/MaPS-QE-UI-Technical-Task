name: QA Automation CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  qa-tests:
    name: Typecheck and Cucumber Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers and OS deps
        run: npx playwright install --with-deps

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test
        env:
          HEADLESS: true

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-html-report
          path: cucumber-report.html
          if-no-files-found: warn

      - name: Upload JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-json-report
          path: cucumber-report.json
          if-no-files-found: warn

      - name: Upload reports folder
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-folder
          path: reports/
          if-no-files-found: warn

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          if-no-files-found: warn
